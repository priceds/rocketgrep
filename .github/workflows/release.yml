name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --all --locked

  build:
    name: Build ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: rocketgrep-x86_64-unknown-linux-gnu.tar.gz
            binary: rocketgrep
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: rocketgrep-x86_64-apple-darwin.tar.gz
            binary: rocketgrep
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: rocketgrep-aarch64-apple-darwin.tar.gz
            binary: rocketgrep
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: rocketgrep-x86_64-pc-windows-msvc.zip
            binary: rocketgrep.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --bin rocketgrep --target ${{ matrix.target }}

      - name: Prepare artifact directory
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" dist/
          cp README.md dist/
          cp PULL_REQUEST.md dist/RELEASE_NOTES.md

      - name: Create Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: tar -czf "${{ matrix.archive }}" -C dist .

      - name: Create Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/* -DestinationPath "${{ matrix.archive }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Compute checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Determine tag
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: rocketgrep ${{ steps.release.outputs.tag }}
          body_path: PULL_REQUEST.md
          files: |
            dist/*
